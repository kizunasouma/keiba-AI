version: '3.9'
services:
  db:
    image: postgres:16
    container_name: keiba_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-keiba_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD を .env に設定してください}
      POSTGRES_DB: ${POSTGRES_DB:-keiba_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: keiba_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@keiba.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD を .env に設定してください}
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata: